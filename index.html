<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Perception Index</title>
    <!-- Properly reference required stylesheets and scripts -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --accent-color: #e74c3c;
            --background-color: #0f172a;
            --text-color: #f8fafc;
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .wave-text {
            font-size: 4rem;
            font-weight: bold;
            position: relative;
            background: linear-gradient(45deg, #3498db, #2ecc71, #e74c3c, #9b59b6, #f1c40f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            overflow: hidden;
            height: 6rem;
        }

        .wave-text::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background-color);
            z-index: 1;
            animation: move 3s ease-in-out infinite, loading 10s linear forwards;
            clip-path: polygon(0% 99%, 0 65%, 15% 49%, 32% 49%, 47% 61%, 63% 70%, 82% 70%, 100% 61%, 100% 99%);
        }

        .loading-progress {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            width: 0%;
            border-radius: 5px;
            transition: width 0.5s;
        }

        .loading-text {
            font-size: 1.2rem;
            margin-top: 15px;
            opacity: 0.8;
        }

        .percentage {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        .brain-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #3498db;
            animation: pulse 2s infinite;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.3;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: float 20s linear infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes move {
            0%, 100% {
                clip-path: polygon(0% 99%, 0 65%, 15% 49%, 32% 49%, 47% 61%, 63% 70%, 82% 70%, 100% 61%, 100% 99%);
            }
            50% {
                clip-path: polygon(0% 99%, 0 63%, 16% 70%, 33% 69%, 50% 61%, 67% 49%, 85% 50%, 100% 63%, 100% 99%);
            }
        }

        @keyframes loading {
            0% {
                height: 100%;
                bottom: 0;
            }
            100% {
                height: 0%;
                bottom: 0;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-800px) translateX(200px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="landing-container">
        <i class="fas fa-brain brain-icon"></i>
        <div class="wave-text">AGI Perception Index</div>
        <div class="loading-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="percentage" id="percentage">0%</div>
        <div class="loading-text" id="loading-text">Loading resources...</div>
    </div>

    <script>
        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size between 2 and 6px
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // Random animation duration between 10 and 30s
                const duration = Math.random() * 20 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                // Random animation delay
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Preload main.html in the background
        function preloadMainPage() {
            const mainPagePreloader = new Image();
            mainPagePreloader.src = 'main.html';
        }

        // Simulate loading while preloading the main page in the background
        function simulateLoading() {
            // Start preloading the main page in the background
            preloadMainPage();
            
            const progressBar = document.getElementById('progress-bar');
            const percentageText = document.getElementById('percentage');
            const loadingText = document.getElementById('loading-text');
            
            const loadingMessages = [
                'Loading resources...',
                'Initializing database connection...',
                'Loading statistics data...',
                'Preparing professions data...',
                'Initializing charts...',
                'Loading activity feed...',
                'Finalizing...'
            ];
            
            // Create an iframe to preload and cache the main page content
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = 'main.html';
            document.body.appendChild(iframe);
            
            let progress = 0;
            let messageIndex = 0;
            
            const interval = setInterval(() => {
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    // Set flags for the main page
                    sessionStorage.setItem('hasVisitedBefore', 'true');
                    sessionStorage.setItem('preloadComplete', 'true');
                    
                    // Clean up the preload iframe before redirecting
                    document.body.removeChild(iframe);
                    
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 1000);
                    return;
                }
                
                // Increment progress with variable speed
                // Slow at first to allow background loading, faster at the end
                let increment;
                if (progress < 50) {
                    increment = Math.random() * 2 + 0.5; // Slower at the beginning
                } else if (progress > 80) {
                    increment = Math.random() * 4 + 2; // Faster at the end
                } else {
                    increment = Math.random() * 3 + 1; // Medium in the middle
                }
                
                progress = Math.min(progress + increment, 100);
                
                // Update progress bar
                progressBar.style.width = `${progress}%`;
                percentageText.textContent = `${Math.round(progress)}%`;
                
                // Update loading message
                if (progress > messageIndex * 14 && messageIndex < loadingMessages.length) {
                    loadingText.textContent = loadingMessages[messageIndex];
                    messageIndex++;
                }
            }, 150);
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            createParticles();
            simulateLoading();
        });
    </script>
</body>
</html>
